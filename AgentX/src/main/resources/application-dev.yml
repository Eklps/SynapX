agentx:
  container:
    # 支持环境变量，默认使用本地 TCP 端口（Docker 容器内由 docker-compose 覆盖该变量为 /var/run/docker.sock）
    docker-host: ${AGENTX_CONTAINER_DOCKER_HOST:tcp://127.0.0.1:2375}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:agentx}
    username: ${DB_USER:agentx_user}
    password: ${DB_PASSWORD:agentx_pass}

embedding:
  vector-store:
    host: ${VECTOR_DB_HOST:${DB_HOST:127.0.0.1}}
    user: ${VECTOR_DB_USER:${DB_USER:agentx_user}}
    password: ${VECTOR_DB_PASSWORD:${DB_PASSWORD:agentx_pass}}

memory:
  embedding:
    vector-store:
      host: ${VECTOR_DB_HOST:${DB_HOST:127.0.0.1}}
      user: ${VECTOR_DB_USER:${DB_USER:agentx_user}}
      password: ${VECTOR_DB_PASSWORD:${DB_PASSWORD:agentx_pass}}

dromara:
  x-file-storage:
    default-platform: local-1
    amazon-s3:
      - platform: amazon-s3-1
        enable-storage: false
    local:
      - platform: local-1
        enable-storage: true
        enable-access: true
        domain: "http://localhost:8088/api/file/"
        base-path: "${FILE_STORAGE_PATH:E:/agentProject/myAgent/ragRepo/}"
        path-patterns: "/file/**"

mcp:
  gateway:
    connect-timeout: ${MCP_GATEWAY_CONNECT_TIMEOUT:60000}
    read-timeout: ${MCP_GATEWAY_READ_TIMEOUT:300000}
